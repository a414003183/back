# Nginx 配置：aixiaoya.site
# 部署方式：
#   1. 安装 certbot 并申请证书：certbot --nginx -d aixiaoya.site -d www.aixiaoya.site
#   2. 将本文件复制到 /etc/nginx/sites-available/aixiaoya.site
#   3. ln -s /etc/nginx/sites-available/aixiaoya.site /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

# HTTP：强制跳转到 HTTPS
server {
    listen 80;
    server_name aixiaoya.site www.aixiaoya.site;

    # Certbot 验证需要保留这一段，申请证书后可由 certbot 自动管理
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name aixiaoya.site www.aixiaoya.site;

    # SSL 证书路径（由 certbot 自动配置）
    # ssl_certificate /etc/letsencrypt/live/aixiaoya.site/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/aixiaoya.site/privkey.pem;

    # 前端产物根目录（admin 管理后台）
    root /opt/app/web/current/admin;
    index index.html;

    # 日志
    access_log /var/log/nginx/aixiaoya.site.access.log;
    error_log /var/log/nginx/aixiaoya.site.error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接/文件上传相关
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }

    # 上传文件目录（持久化，不随部署覆盖）
    location /uploads/ {
        alias /opt/app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 商城前端（mall）
    location /mall/ {
        alias /opt/app/web/current/mall/;
        index index.html;
        try_files $uri $uri/ /mall/index.html;
    }

    # admin 单页应用路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
