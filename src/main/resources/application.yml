server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: 8080

spring:
  application:
    name: telecom-scm-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:db}
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  # 扫描枚举包，使实体类可以直接使用枚举类型字段
  type-enums-package: com.telecom.scm.common.enums

app:
  file:
    storage-dir: ${FILE_STORAGE_DIR:../uploads}
  security:
    jwt:
      secret: ${JWT_SECRET:telecom-scm-real-data-key-2026-springboot-react}
      expire-seconds: 43200
    cors:
      allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.*:*,https://aixiaoya.site,http://aixiaoya.site}

logging:
  level:
    com.telecom.scm: info
